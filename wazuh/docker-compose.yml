version: '3.9'

services:
  wazuh.manager:
    image: wazuh/wazuh-manager:4.12.0
    container_name: wazuh-manager
    restart: always
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    environment:
      - MANAGER_NODE_NAME=${WAZUH_MANAGER_NODE_NAME}
      - ELASTICSEARCH_HOST=${WAZUH_INDEXER_HOST}
      - ELASTICSEARCH_PORT=${WAZUH_INDEXER_PORT}
    volumes:
      - wazuh_manager_data:/var/ossec/data
    networks:
      - wazuh-net

  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.12.0
    container_name: wazuh-indexer
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${WAZUH_INDEXER_ADMIN_PASSWORD}
      - OPENSEARCH_JAVA_OPTS=${WAZUH_INDEXER_JAVA_OPTS}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
    networks:
      - wazuh-net

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.12.0
    container_name: wazuh-dashboard
    restart: always
    ports:
      - "5601:5601"
    environment:
      - DASHBOARD_PASSWORD=${WAZUH_DASHBOARD_PASSWORD}
      - WAZUH_API_URL=${WAZUH_DASHBOARD_API_URL}
    depends_on:
      - wazuh.manager
      - wazuh.indexer
    networks:
      - wazuh-net

volumes:
  wazuh_manager_data:
    name: wazuh_manager_data
  wazuh_indexer_data:
    name: wazuh_indexer_data

networks:
  wazuh-net:
    driver: bridge
