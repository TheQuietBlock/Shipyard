server {
    listen 80;
    server_name site1.example.com; # Change this to your actual first domain

    root /var/www/site1;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name site2.example.com; # Change this to your actual second domain

    root /var/www/site2;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }
}
