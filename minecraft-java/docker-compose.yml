version: '3.8'

services:
  minecraft:
    image: itzg/minecraft-server:latest
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '4.0'
          memory: 8G
      placement:
        constraints:
          - node.role == worker
    environment:
      EULA: "TRUE"
      MEMORY: 8G
    ports:
      - "25565:25565"
    volumes:
      - /home/patrick/minecraft-java/data:/data

volumes:
  minecraft_data: